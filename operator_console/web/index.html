<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<title>GO2W Navigation Console</title>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #0f1117;
  --surface: #1a1d27;
  --surface-hi: #222636;
  --border: #2a2d3a;
  --text: #e4e4e7;
  --text-dim: #8b8d98;
  --green: #22c55e;
  --green-dim: #166534;
  --red: #ef4444;
  --red-dim: #7f1d1d;
  --blue: #3b82f6;
  --blue-dim: #1e3a8a;
  --yellow: #eab308;
  --radius: 8px;
}

body {
  font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100vh;
  padding: 16px 16px 160px 16px; /* reserve space for the sticky E-STOP bar */
  -webkit-tap-highlight-color: transparent;
}

/* Sticky emergency-stop bar — always on screen, full-width */
.estop-bar {
  position: fixed;
  left: 0; right: 0; bottom: 0;
  padding: 14px 16px calc(14px + env(safe-area-inset-bottom, 0px));
  background: linear-gradient(180deg, rgba(15,17,23,0.3) 0%, rgba(15,17,23,0.97) 60%);
  z-index: 200;
  pointer-events: none;
}

@keyframes estop-pulse {
  0%, 100% { box-shadow: 0 8px 26px rgba(239,68,68,0.55); }
  50%      { box-shadow: 0 10px 36px rgba(239,68,68,0.95); }
}

.estop-btn {
  pointer-events: auto;
  display: block;
  width: 100%;
  padding: 22px 16px;
  border: 3px solid #fca5a5;
  border-radius: 12px;
  background: #dc2626;
  color: #fff;
  font-size: 22px;
  font-weight: 900;
  letter-spacing: 3px;
  text-transform: uppercase;
  cursor: pointer;
  animation: estop-pulse 1.6s ease-in-out infinite;
  transition: transform 0.05s, opacity 0.1s;
  -webkit-user-select: none;
  user-select: none;
}
.estop-btn:active { transform: scale(0.98); }
.estop-btn.busy {
  animation: none;
  background: #7f1d1d;
  border-color: #7f1d1d;
  opacity: 0.85;
}
.estop-btn-sub {
  display: block;
  font-size: 11px;
  font-weight: 600;
  letter-spacing: 1px;
  margin-top: 4px;
  opacity: 0.85;
}
.estop-detail {
  margin-top: 6px;
  font-size: 11px;
  color: var(--text-dim);
  text-align: center;
  pointer-events: auto;
  min-height: 14px;
}

h1 {
  font-size: 20px;
  font-weight: 600;
  margin-bottom: 16px;
  display: flex;
  align-items: center;
  gap: 8px;
}

.card {
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 16px;
  margin-bottom: 12px;
}

.card-title {
  font-size: 14px;
  font-weight: 600;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.5px;
  margin-bottom: 12px;
  display: flex;
  align-items: center;
  justify-content: space-between;
}

/* Status */
.status-row { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
.status-dot {
  width: 10px; height: 10px; border-radius: 50%;
  background: var(--text-dim); flex-shrink: 0;
}
.status-dot.running { background: var(--green); box-shadow: 0 0 8px var(--green); }
.status-dot.starting { background: var(--yellow); box-shadow: 0 0 8px var(--yellow); }
.status-dot.stopping { background: var(--yellow); }
.status-dot.stopped { background: var(--text-dim); }
.status-dot.succeeded { background: var(--green); }
.status-dot.failed { background: var(--red); }
.status-dot.canceled { background: var(--text-dim); }
.status-dot.idle { background: var(--text-dim); }
.status-text { font-size: 16px; font-weight: 500; }
.status-detail { font-size: 13px; color: var(--text-dim); }

/* Profile selector */
.profile-select {
  width: 100%;
  padding: 10px 12px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 15px;
  margin-bottom: 12px;
  appearance: none;
  -webkit-appearance: none;
  cursor: pointer;
}
.profile-desc {
  font-size: 13px;
  color: var(--text-dim);
  margin-bottom: 12px;
  line-height: 1.4;
}

/* Buttons */
.btn-row { display: flex; gap: 10px; }
.btn {
  flex: 1;
  padding: 12px 16px;
  border: none;
  border-radius: var(--radius);
  font-size: 15px;
  font-weight: 600;
  cursor: pointer;
  transition: opacity 0.15s;
  display: flex;
  align-items: center;
  justify-content: center;
  gap: 6px;
}
.btn:active { opacity: 0.7; }
.btn:disabled { opacity: 0.4; cursor: not-allowed; }
.btn-start { background: var(--green-dim); color: var(--green); }
.btn-stop { background: var(--red-dim); color: var(--red); }
.btn-cancel { background: var(--red-dim); color: var(--red); }
.btn-secondary { background: var(--blue-dim); color: var(--blue); }

.form-grid {
  display: grid;
  grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
  gap: 10px;
}
.field { display: flex; flex-direction: column; gap: 5px; }
.field label {
  font-size: 11px;
  color: var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 0.4px;
}
.field input,
.field select {
  width: 100%;
  padding: 9px 10px;
  background: var(--bg);
  color: var(--text);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  font-size: 14px;
}
.checkbox-row {
  display: flex;
  flex-wrap: wrap;
  gap: 12px;
  margin: 12px 0;
  font-size: 13px;
  color: var(--text-dim);
}
.checkbox-row label { display: flex; align-items: center; gap: 6px; }

/* POI picker */
.poi-list {
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(120px, 1fr));
  gap: 8px;
}
.poi-btn {
  text-align: left;
  padding: 10px 12px;
  background: var(--surface-hi);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--text);
  cursor: pointer;
  font-size: 14px;
  line-height: 1.35;
}
.poi-btn:active { opacity: 0.7; }
.poi-btn.active { border-color: var(--blue); background: var(--blue-dim); }
.poi-btn-id { font-weight: 600; }
.poi-btn-meta { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
.poi-empty { font-size: 13px; color: var(--text-dim); padding: 8px 0; }

/* Logs */
.log-area {
  background: #000;
  border-radius: var(--radius);
  padding: 10px;
  font-family: "SF Mono", "Cascadia Code", "Consolas", monospace;
  font-size: 12px;
  line-height: 1.5;
  max-height: 240px;
  overflow-y: auto;
  color: #a0a0a0;
  white-space: pre-wrap;
  word-break: break-all;
}

/* Links */
.link-row { display: flex; gap: 10px; flex-wrap: wrap; }
.link-btn {
  flex: 1; min-width: 140px;
  padding: 10px;
  background: var(--bg);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  color: var(--blue);
  text-decoration: none;
  text-align: center;
  font-size: 14px;
  font-weight: 500;
}
.link-btn:active { opacity: 0.7; }

/* Health */
.health-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
.health-item { display: flex; align-items: center; gap: 6px; font-size: 13px; }

/* Refresh icon */
.refresh-btn {
  background: transparent;
  border: none;
  color: var(--text-dim);
  font-size: 13px;
  padding: 2px 8px;
  cursor: pointer;
}
.refresh-btn:active { color: var(--text); }

/* Toast */
.toast {
  position: fixed;
  bottom: 20px; left: 50%;
  transform: translateX(-50%);
  background: var(--surface);
  border: 1px solid var(--border);
  border-radius: var(--radius);
  padding: 10px 20px;
  font-size: 14px;
  z-index: 100;
  opacity: 0;
  transition: opacity 0.3s;
  pointer-events: none;
  max-width: 90vw;
  text-align: center;
}
.toast.show { opacity: 1; }
</style>
</head>
<body>

<h1>GO2W Navigation Console</h1>

<!-- Stack Status -->
<div class="card">
  <div class="card-title">Stack Status</div>
  <div class="status-row">
    <div class="status-dot" id="statusDot"></div>
    <span class="status-text" id="statusText">--</span>
  </div>
  <div class="status-detail" id="statusDetail"></div>
</div>

<!-- Control: start / stop the navigation stack -->
<div class="card">
  <div class="card-title">Profile</div>
  <select class="profile-select" id="profileSelect">
    <option value="">Loading...</option>
  </select>
  <div class="profile-desc" id="profileDesc"></div>
  <div class="btn-row">
    <button class="btn btn-start" id="btnStart" disabled>Start</button>
    <button class="btn btn-stop" id="btnStop" disabled>Stop</button>
  </div>
</div>

<!-- POI dispatch -->
<div class="card">
  <div class="card-title">
    <span>Navigate to POI</span>
    <button class="refresh-btn" id="btnRefreshPOIs">↻ refresh</button>
  </div>
  <div class="status-row">
    <div class="status-dot idle" id="navDot"></div>
    <span class="status-text" id="navText">Idle</span>
  </div>
  <div class="status-detail" id="navDetail" style="margin-bottom: 12px;"></div>
  <div class="poi-list" id="poiList">
    <div class="poi-empty">Loading POIs…</div>
  </div>
  <div style="margin-top: 12px;">
    <button class="btn btn-cancel" id="btnCancelNav" disabled>Cancel navigation</button>
  </div>
</div>

<!-- Debug bag navigation -->
<div class="card">
  <div class="card-title">
    <span>Debug Bag Navigation</span>
    <button class="refresh-btn" id="btnRefreshDebug">↻ status</button>
  </div>
  <div class="status-row">
    <div class="status-dot idle" id="debugDot"></div>
    <span class="status-text" id="debugText">Idle</span>
  </div>
  <div class="status-detail" id="debugDetail" style="margin-bottom: 12px;"></div>
  <div class="form-grid">
    <div class="field">
      <label for="debugProfile">Map Profile</label>
      <select id="debugProfile"></select>
    </div>
    <div class="field">
      <label for="debugTargetId">Waypoint</label>
      <input id="debugTargetId" type="text" placeholder="POI_019">
    </div>
    <div class="field">
      <label for="debugSequence">Sequence</label>
      <input id="debugSequence" type="text" placeholder="POI_019,POI_020">
    </div>
    <div class="field">
      <label for="debugNearGoalDistance">Near Goal m</label>
      <input id="debugNearGoalDistance" type="number" step="0.05" min="0.01">
    </div>
    <div class="field">
      <label for="debugSuccessDistance">Success m</label>
      <input id="debugSuccessDistance" type="number" step="0.05" min="0.01">
    </div>
    <div class="field">
      <label for="debugAbortRetries">Abort Retries</label>
      <input id="debugAbortRetries" type="number" step="1" min="0">
    </div>
    <div class="field">
      <label for="debugTfTimeout">TF Timeout s</label>
      <input id="debugTfTimeout" type="number" step="1" min="0.1">
    </div>
    <div class="field">
      <label for="debugScanTimeout">Scan Timeout s</label>
      <input id="debugScanTimeout" type="number" step="1" min="0.1">
    </div>
    <div class="field">
      <label for="debugScanMinHz">Scan Min Hz</label>
      <input id="debugScanMinHz" type="number" step="0.5" min="0.1">
    </div>
    <div class="field">
      <label for="debugXt16Timeout">XT16 Timeout s</label>
      <input id="debugXt16Timeout" type="number" step="1" min="0.1">
    </div>
    <div class="field">
      <label for="debugXt16MinHz">XT16 Min Hz</label>
      <input id="debugXt16MinHz" type="number" step="0.5" min="0.1">
    </div>
  </div>
  <div class="checkbox-row">
    <label><input id="debugNoBringup" type="checkbox"> no bringup</label>
    <label><input id="debugAllWaypoints" type="checkbox"> all waypoints</label>
    <label><input id="debugUseYaw" type="checkbox"> use waypoint yaw</label>
    <label><input id="debugContinueOnFailure" type="checkbox"> continue on failure</label>
  </div>
  <div class="btn-row">
    <button class="btn btn-secondary" id="btnStartDebug">Start debug bag</button>
    <button class="btn btn-cancel" id="btnCancelDebug" disabled>Cancel debug</button>
  </div>
</div>

<!-- Stack logs -->
<div class="card">
  <div class="card-title">Stack Logs</div>
  <div class="log-area" id="logArea">No logs yet.</div>
</div>

<!-- Nav logs -->
<div class="card">
  <div class="card-title">Navigation Logs</div>
  <div class="log-area" id="navLogArea">No logs yet.</div>
</div>

<!-- Debug logs -->
<div class="card">
  <div class="card-title">Debug Bag Logs</div>
  <div class="log-area" id="debugLogArea">No logs yet.</div>
</div>

<!-- Quick Links -->
<div class="card">
  <div class="card-title">Visualization</div>
  <div class="link-row">
    <a class="link-btn" id="foxgloveLink" href="#" target="_blank">Foxglove Web</a>
    <a class="link-btn" id="rvizLink" href="#" target="_blank">RViz / noVNC</a>
  </div>
</div>

<!-- Health -->
<div class="card">
  <div class="card-title">Services</div>
  <div class="health-grid" id="healthGrid">--</div>
</div>

<div class="estop-bar">
  <button class="estop-btn" id="btnEstop" type="button">
    紧急停止 · E-STOP
    <span class="estop-btn-sub">kill all profiles · cancel nav2 · publish /cmd_vel = 0</span>
  </button>
  <div class="estop-detail" id="estopDetail"></div>
</div>

<div class="toast" id="toast"></div>

<script>
(function() {
  "use strict";

  // --- Config ---
  var API = window.location.origin;
  var FOXGLOVE_PORT = 8765;
  var POLL_MS = 2000;
  var LOG_POLL_MS = 3000;
  var NAV_POLL_MS = 1000;

  // --- DOM refs ---
  var statusDot = document.getElementById("statusDot");
  var statusText = document.getElementById("statusText");
  var statusDetail = document.getElementById("statusDetail");
  var profileSelect = document.getElementById("profileSelect");
  var profileDesc = document.getElementById("profileDesc");
  var btnStart = document.getElementById("btnStart");
  var btnStop = document.getElementById("btnStop");
  var btnRefreshPOIs = document.getElementById("btnRefreshPOIs");
  var btnCancelNav = document.getElementById("btnCancelNav");
  var poiList = document.getElementById("poiList");
  var navDot = document.getElementById("navDot");
  var navText = document.getElementById("navText");
  var navDetail = document.getElementById("navDetail");
  var logArea = document.getElementById("logArea");
  var navLogArea = document.getElementById("navLogArea");
  var debugDot = document.getElementById("debugDot");
  var debugText = document.getElementById("debugText");
  var debugDetail = document.getElementById("debugDetail");
  var debugLogArea = document.getElementById("debugLogArea");
  var debugProfile = document.getElementById("debugProfile");
  var debugTargetId = document.getElementById("debugTargetId");
  var debugSequence = document.getElementById("debugSequence");
  var debugNearGoalDistance = document.getElementById("debugNearGoalDistance");
  var debugSuccessDistance = document.getElementById("debugSuccessDistance");
  var debugAbortRetries = document.getElementById("debugAbortRetries");
  var debugTfTimeout = document.getElementById("debugTfTimeout");
  var debugScanTimeout = document.getElementById("debugScanTimeout");
  var debugScanMinHz = document.getElementById("debugScanMinHz");
  var debugXt16Timeout = document.getElementById("debugXt16Timeout");
  var debugXt16MinHz = document.getElementById("debugXt16MinHz");
  var debugNoBringup = document.getElementById("debugNoBringup");
  var debugAllWaypoints = document.getElementById("debugAllWaypoints");
  var debugUseYaw = document.getElementById("debugUseYaw");
  var debugContinueOnFailure = document.getElementById("debugContinueOnFailure");
  var btnRefreshDebug = document.getElementById("btnRefreshDebug");
  var btnStartDebug = document.getElementById("btnStartDebug");
  var btnCancelDebug = document.getElementById("btnCancelDebug");
  var foxgloveLink = document.getElementById("foxgloveLink");
  var rvizLink = document.getElementById("rvizLink");
  var healthGrid = document.getElementById("healthGrid");
  var toast = document.getElementById("toast");
  var btnEstop = document.getElementById("btnEstop");
  var estopDetail = document.getElementById("estopDetail");

  // --- State ---
  var profiles = [];
  var currentProfile = "";
  var activeTargetId = null;
  var debugDefaults = {};
  var debugWaypointFiles = {};

  // --- Visualization links ---
  var robotHost = window.location.hostname;
  function applyTemplateUrl(template, extra) {
    extra = extra || {};
    return String(template || "")
      .split("{{host}}").join(robotHost)
      .split("{{foxglove_port}}").join(String(extra.foxglove_port || FOXGLOVE_PORT));
  }

  function loadConfig() {
    api("GET", "/api/config").then(function(data) {
      var viz = data.visualization || {};
      var debugCfg = data.debug_navigation || {};
      FOXGLOVE_PORT = viz.foxglove_port || FOXGLOVE_PORT;
      foxgloveLink.href = applyTemplateUrl(viz.foxglove_url, viz);
      rvizLink.href = applyTemplateUrl(viz.rviz_url, viz);
      populateDebugProfiles(debugCfg.allowed_profiles || ["zt_0", "14_1"], debugCfg.default_profile);
      debugWaypointFiles = debugCfg.waypoint_files || {};
      applyDebugDefaults(debugCfg.defaults || {});
      loadPOIs();
    }).catch(function() {
      foxgloveLink.href = "https://app.foxglove.dev/~/view?ds=foxglove-websocket&ds.url=ws://"
        + robotHost + ":" + FOXGLOVE_PORT;
      rvizLink.href = "http://" + robotHost + ":6080/vnc.html?autoconnect=true&resize=remote";
      populateDebugProfiles(["zt_0", "14_1"], "zt_0");
      loadPOIs();
    });
  }

  function populateDebugProfiles(items, selected) {
    debugProfile.innerHTML = "";
    items.forEach(function(name) {
      var opt = document.createElement("option");
      opt.value = name;
      opt.textContent = name;
      debugProfile.appendChild(opt);
    });
    if (selected) debugProfile.value = selected;
  }

  function applyDebugDefaults(defaults) {
    debugDefaults = defaults || {};
    debugNearGoalDistance.value = valueOrBlank(defaults.near_goal_distance);
    debugSuccessDistance.value = valueOrBlank(defaults.success_check_distance);
    debugAbortRetries.value = valueOrBlank(defaults.abort_replan_retries);
    debugTfTimeout.value = valueOrBlank(defaults.tf_ready_timeout);
    debugScanTimeout.value = valueOrBlank(defaults.scan_ready_timeout);
    debugScanMinHz.value = valueOrBlank(defaults.scan_ready_min_hz);
    debugXt16Timeout.value = valueOrBlank(defaults.xt16_ready_timeout);
    debugXt16MinHz.value = valueOrBlank(defaults.xt16_ready_min_hz);
  }

  function valueOrBlank(v) {
    return v == null ? "" : String(v);
  }

  // --- Toast ---
  var toastTimer = null;
  function showToast(msg) {
    toast.textContent = msg;
    toast.classList.add("show");
    clearTimeout(toastTimer);
    toastTimer = setTimeout(function() { toast.classList.remove("show"); }, 3000);
  }

  function api(method, path, body) {
    var opts = { method: method, headers: {} };
    if (body) {
      opts.headers["Content-Type"] = "application/json";
      opts.body = JSON.stringify(body);
    }
    return fetch(API + path, opts).then(function(r) { return r.json(); });
  }

  // --- Profiles (navigation stack) -----------------------------------------

  function loadProfiles() {
    api("GET", "/api/profiles").then(function(data) {
      profiles = data.profiles || [];
      profileSelect.innerHTML = "";
      profiles.forEach(function(p) {
        var opt = document.createElement("option");
        opt.value = p.name;
        opt.textContent = p.name;
        profileSelect.appendChild(opt);
      });
      if (profiles.length > 0) {
        currentProfile = profiles[0].name;
        profileSelect.value = currentProfile;
        updateProfileDesc();
        btnStart.disabled = false;
        btnStop.disabled = false;
      }
    }).catch(function() {
      profileSelect.innerHTML = '<option value="">Connection failed</option>';
    });
  }

  function updateProfileDesc() {
    var p = profiles.find(function(x) { return x.name === currentProfile; });
    profileDesc.textContent = p ? p.description : "";
  }

  profileSelect.addEventListener("change", function() {
    currentProfile = this.value;
    updateProfileDesc();
    pollStatus();
    pollStackLogs();
  });

  btnStart.addEventListener("click", function() {
    if (!currentProfile) return;
    btnStart.disabled = true;
    api("POST", "/api/profiles/" + currentProfile + "/start").then(function(r) {
      if (r.ok) {
        showToast("Started " + currentProfile);
      } else {
        showToast(r.error || "Start failed");
      }
      pollStatus();
    }).catch(function() {
      showToast("Connection failed");
    }).finally(function() {
      btnStart.disabled = false;
    });
  });

  btnStop.addEventListener("click", function() {
    if (!currentProfile) return;
    btnStop.disabled = true;
    showToast("Stopping " + currentProfile + "...");
    api("POST", "/api/profiles/" + currentProfile + "/stop").then(function(r) {
      if (r.ok) {
        showToast("Stopped " + currentProfile);
      } else {
        showToast(r.error || "Stop failed");
      }
      pollStatus();
      pollNavStatus();
    }).catch(function() {
      showToast("Connection failed");
    }).finally(function() {
      btnStop.disabled = false;
    });
  });

  // --- Stack status + logs --------------------------------------------------

  function pollStatus() {
    if (!currentProfile) return;
    api("GET", "/api/profiles/" + currentProfile + "/status").then(function(s) {
      var state = s.state || "stopped";
      statusDot.className = "status-dot " + state;
      statusText.textContent = capitalize(state);

      var details = [];
      if (s.pid) details.push("PID " + s.pid);
      if (s.uptime_seconds != null) details.push(formatUptime(s.uptime_seconds));
      if (s.exit_code != null && state === "stopped") details.push("exit " + s.exit_code);
      statusDetail.textContent = details.join("  |  ");
    }).catch(function() {
      statusDot.className = "status-dot";
      statusText.textContent = "Disconnected";
      statusDetail.textContent = "";
    });
  }

  function pollStackLogs() {
    if (!currentProfile) return;
    api("GET", "/api/profiles/" + currentProfile + "/logs?tail=80").then(function(data) {
      var lines = data.lines || [];
      logArea.textContent = lines.length ? lines.join("\n") : "No logs yet.";
      logArea.scrollTop = logArea.scrollHeight;
    }).catch(function() {});
  }

  // --- POIs + navigation ----------------------------------------------------

  function renderPOIs(waypoints) {
    if (!waypoints || waypoints.length === 0) {
      poiList.innerHTML = '<div class="poi-empty">No POIs loaded. Check waypoint file on the robot.</div>';
      return;
    }
    poiList.innerHTML = "";
    waypoints.forEach(function(wp) {
      var btn = document.createElement("button");
      btn.className = "poi-btn";
      btn.dataset.id = wp.id;
      if (activeTargetId && wp.id === activeTargetId) btn.classList.add("active");

      var idEl = document.createElement("div");
      idEl.className = "poi-btn-id";
      idEl.textContent = wp.id;
      btn.appendChild(idEl);

      var metaEl = document.createElement("div");
      metaEl.className = "poi-btn-meta";
      metaEl.textContent = wp.name + "  ·  x=" + wp.x.toFixed(2) + " y=" + wp.y.toFixed(2);
      btn.appendChild(metaEl);

      btn.addEventListener("click", function() {
        triggerNavigate(wp.id);
      });

      poiList.appendChild(btn);
    });
  }

  function loadPOIs() {
    var profile = debugProfile.value || "";
    var path = profile
      ? "/api/waypoints?profile=" + encodeURIComponent(profile)
      : "/api/waypoints";
    api("GET", path).then(function(data) {
      if (!data.ok) {
        poiList.innerHTML = '<div class="poi-empty">' + (data.error || "Failed to load POIs.") + '</div>';
        return;
      }
      renderPOIs(data.waypoints || []);
    }).catch(function() {
      poiList.innerHTML = '<div class="poi-empty">Connection failed while loading POIs.</div>';
    });
  }

  function triggerNavigate(targetId) {
    showToast("Dispatching navigation to " + targetId + "…");
    var body = { target_id: targetId };
    var profile = debugProfile.value || "";
    if (profile && debugWaypointFiles[profile]) {
      body.waypoint_file = debugWaypointFiles[profile];
    }
    api("POST", "/api/nav/goto", body).then(function(r) {
      if (r.ok) {
        activeTargetId = targetId;
        highlightActivePOI();
        showToast("Navigating to " + targetId);
      } else {
        showToast(r.error || "Dispatch failed");
      }
      pollNavStatus();
    }).catch(function() {
      showToast("Connection failed");
    });
  }

  function highlightActivePOI() {
    var buttons = poiList.querySelectorAll(".poi-btn");
    buttons.forEach(function(b) {
      if (b.dataset.id === activeTargetId) {
        b.classList.add("active");
      } else {
        b.classList.remove("active");
      }
    });
  }

  btnRefreshPOIs.addEventListener("click", loadPOIs);
  debugProfile.addEventListener("change", loadPOIs);

  btnCancelNav.addEventListener("click", function() {
    btnCancelNav.disabled = true;
    api("POST", "/api/nav/cancel").then(function(r) {
      showToast(r.message || "Cancel requested");
      pollNavStatus();
    }).catch(function() {
      showToast("Connection failed");
    });
  });

  // --- Emergency stop -----------------------------------------------------

  var ESTOP_LABEL_HTML =
    '紧急停止 · E-STOP' +
    '<span class="estop-btn-sub">kill all profiles · cancel nav2 · publish /cmd_vel = 0</span>';

  function sendEstop(attempt) {
    attempt = attempt || 1;
    return fetch(API + "/api/nav/estop", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: "{}",
      cache: "no-store",
    }).then(function(r) { return r.json(); }).catch(function(err) {
      // One instant retry — user slammed the button, the phone may have
      // fumbled the first request. Never leave them guessing.
      if (attempt < 2) return sendEstop(attempt + 1);
      throw err;
    });
  }

  btnEstop.addEventListener("click", function() {
    if (btnEstop.classList.contains("busy")) return;
    btnEstop.classList.add("busy");
    btnEstop.innerHTML = 'STOPPING…<span class="estop-btn-sub">killing profiles + holding /cmd_vel = 0</span>';
    showToast("Emergency stop sent");

    sendEstop().then(function(r) {
      var parts = [];
      parts.push(r.ok ? "E-STOP ok" : "E-STOP FAILED");
      if (r.killed_process) parts.push("killed nav subprocess");
      if (r.stopped_profiles && r.stopped_profiles.length) {
        parts.push("stopped: " + r.stopped_profiles.join(", "));
      } else {
        parts.push("no profile was running");
      }
      if (r.elapsed_seconds != null) parts.push(r.elapsed_seconds + "s");
      if (!r.ok && r.error) parts.push(r.error);
      showToast(parts.join(" · "));
      pollNavStatus();
      pollStatus();
      pollHealth();
    }).catch(function() {
      showToast("E-STOP: connection failed after retry — SSH to robot and `pkill -f navigation`.");
    }).finally(function() {
      btnEstop.classList.remove("busy");
      btnEstop.innerHTML = ESTOP_LABEL_HTML;
    });
  });

  function pollNavStatus() {
    api("GET", "/api/nav/status").then(function(s) {
      var state = s.state || "idle";
      navDot.className = "status-dot " + state;
      navText.textContent = capitalize(state) +
        (s.target_id ? "  ·  " + s.target_id : "");

      var details = [];
      if (s.remaining_distance != null) {
        details.push("dist=" + Number(s.remaining_distance).toFixed(2) + " m");
      }
      if (s.uptime_seconds != null) details.push(formatUptime(s.uptime_seconds));
      if (s.exit_code != null && state !== "running" && state !== "starting") {
        details.push("exit " + s.exit_code);
      }
      if (s.error) details.push(s.error);
      navDetail.textContent = details.join("  |  ");

      if (state === "running" || state === "starting") {
        btnCancelNav.disabled = false;
        activeTargetId = s.target_id || activeTargetId;
      } else {
        btnCancelNav.disabled = true;
        if (
          state === "succeeded" || state === "failed" ||
          state === "canceled" || state === "estopped" || state === "idle"
        ) {
          if (state !== "running") activeTargetId = null;
        }
      }
      highlightActivePOI();

      if (s.last_estop) {
        var when = s.last_estop.at ? new Date(s.last_estop.at).toLocaleTimeString() : "";
        estopDetail.textContent =
          "Last E-STOP " + when + " · " +
          (s.last_estop.ok ? "ok" : "failed") +
          (s.last_estop.detail ? " · " + s.last_estop.detail : "");
      } else {
        estopDetail.textContent = "";
      }
    }).catch(function() {
      navDot.className = "status-dot";
      navText.textContent = "Disconnected";
      navDetail.textContent = "";
      btnCancelNav.disabled = true;
    });
  }

  function pollNavLogs() {
    api("GET", "/api/nav/logs?tail=60").then(function(data) {
      var lines = data.lines || [];
      navLogArea.textContent = lines.length ? lines.join("\n") : "No logs yet.";
      navLogArea.scrollTop = navLogArea.scrollHeight;
    }).catch(function() {});
  }

  // --- Debug bag navigation -----------------------------------------------

  function numberOrNull(input) {
    if (!input || input.value === "") return null;
    return Number(input.value);
  }

  function collectDebugRequest() {
    var req = {
      profile: debugProfile.value || "zt_0",
      no_bringup: debugNoBringup.checked,
      all_waypoints: debugAllWaypoints.checked,
      use_waypoint_yaw: debugUseYaw.checked,
      continue_on_failure: debugContinueOnFailure.checked,
      near_goal_distance: numberOrNull(debugNearGoalDistance),
      success_check_distance: numberOrNull(debugSuccessDistance),
      abort_replan_retries: numberOrNull(debugAbortRetries),
      tf_ready_timeout: numberOrNull(debugTfTimeout),
      scan_ready_timeout: numberOrNull(debugScanTimeout),
      scan_ready_min_hz: numberOrNull(debugScanMinHz),
      xt16_ready_timeout: numberOrNull(debugXt16Timeout),
      xt16_ready_min_hz: numberOrNull(debugXt16MinHz),
    };
    var target = debugTargetId.value.trim();
    var sequence = debugSequence.value.trim();
    if (target) req.target_id = target;
    if (sequence) req.waypoint_sequence = sequence;
    return req;
  }

  btnStartDebug.addEventListener("click", function() {
    btnStartDebug.disabled = true;
    api("POST", "/api/debug/start", collectDebugRequest()).then(function(r) {
      if (r.ok) {
        showToast("Debug bag navigation started");
      } else {
        showToast(r.error || "Debug start failed");
      }
      pollDebugStatus();
    }).catch(function() {
      showToast("Connection failed");
    }).finally(function() {
      btnStartDebug.disabled = false;
    });
  });

  btnCancelDebug.addEventListener("click", function() {
    btnCancelDebug.disabled = true;
    api("POST", "/api/debug/cancel").then(function(r) {
      showToast(r.message || "Debug cancel requested");
      pollDebugStatus();
    }).catch(function() {
      showToast("Connection failed");
    });
  });

  btnRefreshDebug.addEventListener("click", function() {
    pollDebugStatus();
    pollDebugLogs();
  });

  function pollDebugStatus() {
    api("GET", "/api/debug/status").then(function(s) {
      var state = s.state || "idle";
      debugDot.className = "status-dot " + state;
      debugText.textContent = capitalize(state);

      var details = [];
      if (s.pid) details.push("PID " + s.pid);
      if (s.uptime_seconds != null) details.push(formatUptime(s.uptime_seconds));
      if (s.exit_code != null && state !== "running") details.push("exit " + s.exit_code);
      if (s.request && s.request.profile) details.push("profile " + s.request.profile);
      if (s.error) details.push(s.error);
      debugDetail.textContent = details.join("  |  ");

      btnCancelDebug.disabled = !(state === "running" || state === "starting");
    }).catch(function() {
      debugDot.className = "status-dot";
      debugText.textContent = "Disconnected";
      debugDetail.textContent = "";
      btnCancelDebug.disabled = true;
    });
  }

  function pollDebugLogs() {
    api("GET", "/api/debug/logs?tail=80").then(function(data) {
      var lines = data.lines || [];
      debugLogArea.textContent = lines.length ? lines.join("\n") : "No logs yet.";
      debugLogArea.scrollTop = debugLogArea.scrollHeight;
    }).catch(function() {});
  }

  // --- Health --------------------------------------------------------------

  function pollHealth() {
    api("GET", "/api/health").then(function(data) {
      var services = data.services || {};
      var html = "";
      Object.keys(services).forEach(function(name) {
        var state = services[name];
        var dotClass = state === "running" ? "running"
          : state === "starting" ? "starting"
          : state === "stopping" ? "stopping"
          : state;
        html += '<div class="health-item">'
          + '<div class="status-dot ' + dotClass + '" style="width:8px;height:8px;"></div>'
          + '<span>' + name + '</span>'
          + '</div>';
      });
      healthGrid.innerHTML = html || "--";
    }).catch(function() {
      healthGrid.innerHTML = '<div class="health-item">Disconnected</div>';
    });
  }

  // --- Utilities -----------------------------------------------------------

  function capitalize(s) {
    if (!s) return "";
    return s.charAt(0).toUpperCase() + s.slice(1);
  }

  function formatUptime(sec) {
    var h = Math.floor(sec / 3600);
    var m = Math.floor((sec % 3600) / 60);
    var s = Math.floor(sec % 60);
    if (h > 0) return h + "h " + m + "m";
    if (m > 0) return m + "m " + s + "s";
    return s + "s";
  }

  // --- Init ----------------------------------------------------------------

  loadConfig();
  loadProfiles();

  setInterval(function() {
    pollStatus();
    pollHealth();
  }, POLL_MS);

  setInterval(pollStackLogs, LOG_POLL_MS);
  setInterval(pollNavStatus, NAV_POLL_MS);
  setInterval(pollNavLogs, LOG_POLL_MS);
  setInterval(pollDebugStatus, NAV_POLL_MS);
  setInterval(pollDebugLogs, LOG_POLL_MS);

  setTimeout(function() {
    pollStatus();
    pollHealth();
    pollStackLogs();
    pollNavStatus();
    pollNavLogs();
    pollDebugStatus();
    pollDebugLogs();
  }, 500);
})();
</script>
</body>
</html>
