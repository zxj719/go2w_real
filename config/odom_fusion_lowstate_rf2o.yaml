ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    transform_time_offset: 0.0
    transform_timeout: 0.2

    map_frame: map
    odom_frame: odom
    base_link_frame: base
    world_frame: odom

    odom0: /rf2o/odom
    odom0_config: [true, true, false,
                   false, false, true,
                   true, true, false,
                   false, false, true,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # LowState yaw is in the body-state convention seen during turn tests.
    # Use only orientation yaw here; yaw rate comes from corrected /utlidar/imu.
    imu0: /lowstate_imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, false,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 50
    imu0_remove_gravitational_acceleration: false

    # /utlidar/imu has lower gyro z bias, but its z axis is opposite base yaw.
    # The adapter publishes corrected angular_velocity.z on /utlidar_imu_base.
    imu1: /utlidar_imu_base
    imu1_config: [false, false, false,
                  false, false, false,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu1_differential: false
    imu1_relative: false
    imu1_queue_size: 50
    imu1_remove_gravitational_acceleration: false
