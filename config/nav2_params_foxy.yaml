# Nav2 Parameters for GO2W on real hardware — Foxy-compatible
# Adapted from the Foxy exploration stack for the standard go2w_real
# SLAM + Nav2 bringup.

bt_navigator:
  ros__parameters:
    global_frame: map
    robot_base_frame: base
    odom_topic: /odom
    bt_loop_duration: 50
    # Nav2 expects this timeout in milliseconds. 20 ms is too short for
    # FollowPath goal handshakes on the real robot stack and causes
    # "send_goal failed" right after planning succeeds.
    default_server_timeout: 5000
    default_bt_xml_filename: "/opt/ros/foxy/share/nav2_bt_navigator/behavior_trees/navigate_w_replanning_and_recovery.xml"
    plugin_lib_names:
      - nav2_compute_path_to_pose_action_bt_node
      - nav2_follow_path_action_bt_node
      - nav2_back_up_action_bt_node
      - nav2_spin_action_bt_node
      - nav2_wait_action_bt_node
      - nav2_clear_costmap_service_bt_node
      - nav2_is_stuck_condition_bt_node
      - nav2_goal_reached_condition_bt_node
      - nav2_goal_updated_condition_bt_node
      - nav2_initial_pose_received_condition_bt_node
      - nav2_reinitialize_global_localization_service_bt_node
      - nav2_rate_controller_bt_node
      - nav2_distance_controller_bt_node
      - nav2_speed_controller_bt_node
      - nav2_truncate_path_action_bt_node
      - nav2_goal_updater_node_bt_node
      - nav2_recovery_node_bt_node
      - nav2_pipeline_sequence_bt_node
      - nav2_round_robin_node_bt_node
      - nav2_transform_available_condition_bt_node
      - nav2_time_expired_condition_bt_node
      - nav2_distance_traveled_condition_bt_node
      - nav2_navigate_to_pose_action_bt_node

controller_server:
  ros__parameters:
    controller_frequency: 15.0
    min_x_velocity_threshold: 0.001
    min_y_velocity_threshold: 0.0
    min_theta_velocity_threshold: 0.02
    failure_tolerance: 1.0
    progress_checker_plugin: "progress_checker"
    goal_checker_plugins: ["general_goal_checker"]
    controller_plugins: ["FollowPath"]

    progress_checker:
      plugin: "nav2_controller::SimpleProgressChecker"
      required_movement_radius: 0.15
      movement_time_allowance: 20.0

    general_goal_checker:
      stateful: True
      plugin: "nav2_controller::SimpleGoalChecker"
      xy_goal_tolerance: 0.30
      yaw_goal_tolerance: 1.0

    FollowPath:
      plugin: "dwb_core::DWBLocalPlanner"
      debug_trajectory_details: True
      # GO2W is commanded as a diff-drive platform in this stack.
      min_vel_x: 0.0
      min_vel_y: 0.0
      max_vel_x: 0.25
      max_vel_y: 0.0
      max_vel_theta: 0.45
      min_vel_theta: 0.05
      min_speed_xy: 0.0
      max_speed_xy: 0.25
      min_speed_theta: 0.05
      acc_lim_x: 1.2
      acc_lim_y: 0.0
      acc_lim_theta: 1.5
      decel_lim_x: -1.2
      decel_lim_y: 0.0
      decel_lim_theta: -1.5
      vx_samples: 15
      vy_samples: 1
      vtheta_samples: 20
      sim_time: 1.2
      linear_granularity: 0.05
      angular_granularity: 0.025
      transform_tolerance: 1.0
      xy_goal_tolerance: 0.30
      trans_stopped_velocity: 0.05
      short_circuit_trajectory_evaluation: True
      stateful: True
      # BaseObstacle evaluates trajectory cost against the costmap directly
      # (same as g1_nav). ObstacleFootprint is heavier and less useful when
      # the costmap inflation already encodes the safety buffer.
      critics: ["RotateToGoal", "Oscillation", "BaseObstacle", "GoalAlign", "PathAlign", "PathDist", "GoalDist"]
      BaseObstacle.scale: 0.02
      PathAlign.scale: 12.0
      PathAlign.forward_point_distance: 0.2
      GoalAlign.scale: 8.0
      GoalAlign.forward_point_distance: 0.2
      PathDist.scale: 24.0
      GoalDist.scale: 10.0
      RotateToGoal.scale: 1.0
      RotateToGoal.slowing_factor: 5.0
      RotateToGoal.lookahead_time: -1.0

# -----------------------------------------------------------------------------
# local_costmap: rolling window in odom frame for real-time obstacle avoidance.
#
# Layer strategy (same philosophy as g1_nav):
#   1. static_layer  — subscribes to /map (live SLAM Toolbox output) so the
#      controller sees ALL mapped obstacles, not just those in the current
#      /scan FOV.  This prevents driving into obstacles behind or beside the
#      robot that have already been mapped.
#   2. obstacle_layer — subscribes to /scan for dynamic obstacles that SLAM
#      hasn't integrated yet (people, doors being opened, etc.).
#   3. inflation_layer — safety buffer around all obstacles.
#
# NOTE on VoxelLayer: GO2W's 3D lidar is converted to 2D /scan via
# pointcloud_to_laserscan (height range [-0.2, 0.4] m). ObstacleLayer with
# LaserScan is sufficient. If you later want full 3D obstacle detection
# (e.g., table legs at heights outside the current slice), replace
# obstacle_layer with VoxelLayer and feed the raw PointCloud2:
#
#   voxel_layer:
#     plugin: "nav2_costmap_2d::VoxelLayer"
#     enabled: True
#     publish_voxel_map: True
#     origin_z: 0.0
#     z_resolution: 0.1
#     z_voxels: 8
#     max_obstacle_height: 1.0
#     mark_threshold: 0
#     observation_sources: pointcloud
#     pointcloud:
#       topic: /cloud_relayed
#       max_obstacle_height: 1.0
#       min_obstacle_height: 0.05
#       clearing: True
#       marking: True
#       data_type: "PointCloud2"
#       raytrace_max_range: 5.0
#       raytrace_min_range: 0.10
#       obstacle_max_range: 5.0
#       obstacle_min_range: 0.10
# -----------------------------------------------------------------------------
local_costmap:
  local_costmap:
    ros__parameters:
      update_frequency: 5.0
      publish_frequency: 5.0
      global_frame: odom
      robot_base_frame: base
      rolling_window: true
      width: 3
      height: 3
      resolution: 0.05
      footprint: "[[-0.29, -0.19], [0.22, -0.19], [0.34, -0.10], [0.34, 0.10], [0.22, 0.19], [-0.29, 0.19]]"
      footprint_padding: 0.01
      transform_tolerance: 1.0
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True
        # Subscribes to /map from SLAM Toolbox so the controller always
        # sees mapped obstacles even outside current scan FOV.
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: True
          # GO2W 3D lidar has 20 m range; local costmap only needs ~3 m
          raytrace_max_range: 3.5
          raytrace_min_range: 0.10
          obstacle_max_range: 3.0
          obstacle_min_range: 0.10
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 10.0
        # Must be >= robot inscribed radius to avoid "robot in obstacle" warnings.
        # GO2W half-width ~0.19 m, keep some margin.
        inflation_radius: 0.22
      always_send_full_costmap: True

# -----------------------------------------------------------------------------
# global_costmap: full map frame for global planning.
#   static_layer  — SLAM map for known structure
#   obstacle_layer — /scan for dynamic obstacles so planner re-routes around
#                    objects not yet in the SLAM map
#   inflation_layer — safety buffer
# -----------------------------------------------------------------------------
global_costmap:
  global_costmap:
    ros__parameters:
      update_frequency: 2.0
      publish_frequency: 2.0
      global_frame: map
      robot_base_frame: base
      footprint: "[[-0.29, -0.19], [0.22, -0.19], [0.34, -0.10], [0.34, 0.10], [0.22, 0.19], [-0.29, 0.19]]"
      footprint_padding: 0.05
      resolution: 0.05
      transform_tolerance: 1.0
      track_unknown_space: true
      plugins: ["static_layer", "obstacle_layer", "inflation_layer"]
      static_layer:
        plugin: "nav2_costmap_2d::StaticLayer"
        enabled: True
        map_subscribe_transient_local: True
      obstacle_layer:
        plugin: "nav2_costmap_2d::ObstacleLayer"
        enabled: True
        observation_sources: scan
        scan:
          topic: /scan
          max_obstacle_height: 2.0
          clearing: True
          marking: True
          data_type: "LaserScan"
          inf_is_valid: True
          # Longer range for global planning — 3D lidar supports up to 20 m,
          # but practical indoor range with scan filter is ~8 m.
          raytrace_max_range: 8.0
          raytrace_min_range: 0.10
          obstacle_max_range: 6.0
          obstacle_min_range: 0.10
      inflation_layer:
        plugin: "nav2_costmap_2d::InflationLayer"
        cost_scaling_factor: 3.0
        inflation_radius: 0.25
      always_send_full_costmap: True

planner_server:
  ros__parameters:
    expected_planner_frequency: 20.0
    planner_plugins: ["GridBased"]
    GridBased:
      plugin: "nav2_navfn_planner/NavfnPlanner"
      tolerance: 0.3
      use_astar: false
      # Frontier explorer already snaps goals to free cells, so the planner
      # should not route through unknown space.
      allow_unknown: false

recoveries_server:
  ros__parameters:
    costmap_topic: local_costmap/costmap_raw
    footprint_topic: local_costmap/published_footprint
    cycle_frequency: 10.0
    recovery_plugins: ["spin", "backup", "wait"]
    spin:
      plugin: "nav2_recoveries/Spin"
    backup:
      plugin: "nav2_recoveries/BackUp"
    wait:
      plugin: "nav2_recoveries/Wait"
    global_frame: odom
    robot_base_frame: base
    transform_tolerance: 1.0
    simulate_ahead_time: 1.0
    max_rotational_vel: 0.45
    min_rotational_vel: 0.15
    rotational_acc_lim: 1.5
