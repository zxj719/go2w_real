ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.2
    two_d_mode: true
    publish_tf: true
    publish_acceleration: false
    print_diagnostics: true
    transform_time_offset: 0.0
    transform_timeout: 0.2
    map_frame: map
    odom_frame: odom
    base_link_frame: base
    world_frame: odom

    # SportModeState now provides a stable planar position estimate after OTA.
    # Use it as the primary local pose source for mapped navigation.
    odom0: /sport_odom
    odom0_config: [true, true, false,
                   false, false, false,
                   true, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false
    odom0_relative: false
    odom0_queue_size: 10

    # Keep yaw and yaw rate from the onboard IMU so the fused odom stays smooth
    # through turns without depending on scan-matching spin behavior.
    imu0: /sport_imu
    imu0_config: [false, false, false,
                  false, false, true,
                  false, false, false,
                  false, false, true,
                  false, false, false]
    imu0_differential: false
    imu0_relative: false
    imu0_queue_size: 20
    imu0_remove_gravitational_acceleration: false
