# =============================================================================
# Frontier Explorer Parameters
# =============================================================================
# GO2W real-robot configuration for the mixed frontier + GVD C++ explorer.
# Frontier provides the exploration direction; GVD provides the preferred
# navigation backbone.
# =============================================================================

frontier_explorer:
  ros__parameters:
    # How often the planner runs (Hz).
    planner_frequency: 0.2

    # TF / topics
    robot_base_frame: base
    odom_frame: odom
    odom_topic: /odom
    global_frame: map
    map_topic: /map
    live_map_ready_topic: /map_live_ready
    require_live_map: false

    # TF lookup tolerance (seconds)
    transform_tolerance: 2.0

    # Frontier filtering
    min_frontier_size: 20
    clearance_scale: 0.2
    frontier_update_radius: 5.0

    # Progress / failure handling
    progress_timeout: 30.0
    blacklist_timeout: 120.0
    frontier_plan_retry_limit: 3
    blacklist_radius: 0.5

    # Completion behavior
    return_to_init: false

    # Visualization
    visualize: true
    visualize_gvd: true
    gvd_marker_publish_every: 3
    gvd_marker_stride: 2

    # --- GVD (Voronoi Skeleton) ---
    gvd_min_clearance: 5
    gvd_snap_radius: 2.0
    gvd_distance_tolerance_cells: 5.0
    gvd_max_site_direction_dot: 0.7
    allow_gvd_bridge: false

    # Direct fallback remains available but is evaluated inside the mixed
    # planning framework after GVD gets a fair chance on the current map.
    allow_safe_direct_frontier_nav: true
    direct_frontier_min_clearance_cells: 6.0

    # Compatibility knobs retained from the sim implementation.
    gvd_heuristic_chain_sample_step: 0.4
    gvd_heuristic_chain_max_offset: 5.0

    # Waypoint generation on the GVD skeleton.
    gvd_waypoint_spacing: 0.6
    gvd_waypoint_smoothing_passes: 0

    # Adaptive segmenting.
    gvd_segment_length: 3.0
    gvd_segment_length_min: 0.4
    gvd_segment_length_max: 6.0
    gvd_jerk_feedback_threshold: 5
    gvd_jerk_progress_epsilon: 0.03
    gvd_jerk_replan_cooldown: 2.0

    # Recovery / deferred replanning.
    stuck_recovery_gvd_radius: 3.0
    replan_while_navigating: true
    gvd_replan_interval: 3.0
    gvd_replan_min_remaining_distance: 0.8

    # Avoid forcing the robot to turn back to a waypoint it has already
    # passed while staying close to the active segment tail.
    gvd_goal_pass_max_goal_distance: 0.45
    gvd_goal_pass_projection_margin: 0.08
    gvd_goal_pass_lateral_tolerance: 0.35

    # Optional timing diagnostics.
    profile_timing: true
    profile_log_interval: 10.0
    profile_callbacks: true
    profile_callback_log_interval: 10.0
